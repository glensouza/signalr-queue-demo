# Serves one Angular app's compiled output (copied to /usr/share/nginx/html by the Dockerfile's serve stage).
# Same file for all three apps -- none of the three need per-app nginx behavior, only per-app content, which the
# Dockerfile already handles by copying a different dist/<app>/browser folder in.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # config.json is overwritten by docker/write-runtime-config.sh at container *start*, after Aspire has
    # assigned the API's real address -- see that script for why. Without this override, nginx's default
    # `expires`/ETag behavior would let a browser cache config.json across container restarts, so a visitor who
    # loaded the page once could keep pointing at a stale API address after the container (and its assigned
    # port) changes. Everything else under html/ is a hashed, content-addressed filename (Angular's
    # outputHashing: "all") that's safe to cache aggressively -- only this one unhashed file needs the opposite
    # policy.
    location = /config.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # Angular client-side routing: a deep-link reload (e.g. /some-route) has no matching file on disk, so nginx
    # must fall back to index.html and let the Angular router take over instead of returning its own 404. None
    # of the three apps in this workspace currently define routes deeper than "/", but this is the standard SPA
    # fallback and cheap insurance against a future route being added without a matching server-side rule.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
