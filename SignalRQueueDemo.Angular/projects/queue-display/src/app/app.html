<main class="board">
  @if (snapshot()) {
    <div class="board-grid">
      <div class="now-serving-section">
        <app-now-serving />
      </div>
      <div class="waiting-section">
        <app-waiting-list />
      </div>
    </div>
    <app-check-in-qr />
  } @else {
    <div class="loading">
      <p>Loading queue…</p>
    </div>
  }

  @if (isPolling()) {
    <div class="reconnecting-banner">
      <p>Reconnecting…</p>
    </div>
  }
</main>
